[build]
  command = "npm run build"
  publish = "dist"
  ignore = "node scripts/netlify-ignore-site.js"

[build.environment]
  NODE_VERSION = "20"

# Same-origin reverse proxy for the trader BFF. This keeps the encrypted
# session server-side and the opaque HttpOnly cookie first-party per site.
[[redirects]]
  from = "/api/deriv-oauth-start"
  to = "https://tsidnkyizypwlxtkkoyd.supabase.co/functions/v1/deriv-oauth-start"
  status = 200
  force = true

[[redirects]]
  from = "/api/deriv-oauth-callback"
  to = "https://tsidnkyizypwlxtkkoyd.supabase.co/functions/v1/deriv-oauth-callback"
  status = 200
  force = true

[[redirects]]
  from = "/api/deriv-trader-session"
  to = "https://tsidnkyizypwlxtkkoyd.supabase.co/functions/v1/deriv-trader-session"
  status = 200
  force = true

[[redirects]]
  from = "/api/deriv-trader-accounts"
  to = "https://tsidnkyizypwlxtkkoyd.supabase.co/functions/v1/deriv-trader-accounts"
  status = 200
  force = true

[[redirects]]
  from = "/api/deriv-trader-otp"
  to = "https://tsidnkyizypwlxtkkoyd.supabase.co/functions/v1/deriv-trader-otp"
  status = 200
  force = true

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

[[headers]]
  for = "/*"
  [headers.values]
    Content-Security-Policy = "default-src 'self'; base-uri 'self'; object-src 'none'; frame-ancestors 'none'; form-action 'self' https://auth.deriv.com; script-src 'self' 'unsafe-inline' 'unsafe-eval' https://survey.survicate.com; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob: https:; font-src 'self' data:; connect-src 'self' https://api.derivws.com wss://api.derivws.com https://*.supabase.co https://survey.survicate.com; frame-src https://*.deriv.com https://drive.google.com; worker-src 'self' blob:; upgrade-insecure-requests"
    Permissions-Policy = "camera=(), microphone=(), geolocation=(), payment=()"
    Referrer-Policy = "strict-origin-when-cross-origin"
    X-Content-Type-Options = "nosniff"
    X-Frame-Options = "DENY"
    Cross-Origin-Opener-Policy = "same-origin-allow-popups"
